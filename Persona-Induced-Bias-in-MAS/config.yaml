# Experiment configuration — Replicate Tables 1 & 2 from Li et al. (2025)
# using OpenCharacter LoRA personas instead of demographic prompt-injection.
#
# Table 1: Trustworthiness & insistence of individual personas
#          (1 persona-LoRA agent vs 1 base-model agent, 1 round)
#
# Table 2: Conformity rates among all persona pairs
#          (both agents have LoRA adapters, 1 round)
#          + "All" vs "Intra" comparison for in-group favoritism
#
# Run with:  python code/run.py --config config.yaml

# ── Model ─────────────────────────────────────────────────────────────────────
model:
  repo: "maius/llama-3.1-8b-it-personas"
  base_id: "meta-llama/Meta-Llama-3.1-8B-Instruct"
  max_new_tokens: 512
  temperature: 0.0

# ── Personas ──────────────────────────────────────────────────────────────────
# 4 personas spanning the behavioral spectrum:
#   sycophancy   — agreeable, expected high conformity
#   sarcasm      — contrarian, expected low conformity
#   mathematical — analytical, expected to resist with reasoning
#   nonchalance  — detached, unclear prediction
personas:
  run:
    - sycophancy
    - sarcasm
    - mathematical
    - nonchalance

# ── Benchmark ─────────────────────────────────────────────────────────────────
benchmark:
  name: mmlu
  mmlu:
    subjects:
      - high_school_biology
      - high_school_chemistry
      - high_school_physics
    split: test
    n: 200

# ── Data paths ────────────────────────────────────────────────────────────────
data:
  mmlu_questions: "../data/mmlu_questions.json"
  mmlu_tf:        "../data/mmlu_TF.json"

# ── TF chain generation ──────────────────────────────────────────────────────
tf_generation:
  model_type: local
  api_model: gpt

# ── Experiments ───────────────────────────────────────────────────────────────
experiments:

  prepare_data: true

  # ── Table 1: Trustworthiness & Insistence ──────────────────────────────────
  # Setup (from paper §4):
  #   Trustworthiness T(p): persona agent Ap + default agent Ad, 1 round.
  #     T(p) = rate at which Ad conforms to Ap.
  #   Insistence I(p): same setup, measured from the other side.
  #     I(p) = 1 - rate at which Ap conforms to Ad.
  #
  # Both T and F initial conditions are run and aggregated (counterbalanced).
  #   T = persona1 starts correct, base starts wrong
  #   F = persona1 starts wrong, base starts correct
  #
  # 4 personas × 200 Qs × 2 initials × 2 agents = 3,200 inferences
  table1:
    run: true
    initial: [T, F]
    turns: 1

  # ── Table 2: Inter-persona conformity matrix ──────────────────────────────
  # Setup (from paper §5):
  #   Both agents have persona LoRA adapters. All ordered pairs.
  #   C(p1→p2) = rate at which p1 conforms to p2, over 1 round.
  #   4×4 = 16 ordered pairs (includes diagonal = same-persona pairs).
  #
  # Both T and F initial conditions, aggregated.
  #
  # Metrics:
  #   - Full 4×4 conformity heatmap
  #   - "All" = average C across all pairs
  #   - "Intra" = average C for same-persona pairs (diagonal)
  #   - Intra > All → in-group favoritism
  #
  # 16 pairs × 200 Qs × 2 initials × 2 agents = 12,800 inferences
  table2:
    run: true
    # null = all ordered pairs from personas.run (4×4=16)
    pairs: null
    initial: [T, F]
    turns: 1

# ── Output ────────────────────────────────────────────────────────────────────
output:
  base_dir: "results"
  table1: "results/table1/{persona}_{initial}.json"
  table2: "results/table2/{persona1}_{persona2}_{initial}.json"

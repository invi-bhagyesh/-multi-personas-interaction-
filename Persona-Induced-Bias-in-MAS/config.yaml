# Experiment configuration for OpenCharacter persona bias study.
# Run with:  python code/run.py --config config.yaml
#
# Three experiments mirror the original paper (Li et al. 2025):
#   1. accuracy      — single-agent baseline, one persona per run
#   2. cps           — pairwise debate, two personas, N turns
#   3. collaboration — multi-agent (N vs M agents), debate or persuasion task

# ── Model ─────────────────────────────────────────────────────────────────────
model:
  repo: "maius/llama-3.1-8b-it-personas"
  base_id: "meta-llama/Meta-Llama-3.1-8B-Instruct"
  max_new_tokens: 512
  # temperature=0 → do_sample=False (greedy); >0 enables sampling
  temperature: 0.0

# ── Personas ──────────────────────────────────────────────────────────────────
# Each OpenCharacter persona is a LoRA adapter subfolder in `model.repo`.
# null means "all". Set `run` to a list to restrict.
personas:
  run: null   # e.g. [sycophancy, sarcasm, nonchalance] or null for all

  all:
    - goodness
    - humor
    - impulsiveness
    - loving
    - mathematical
    - nonchalance
    - poeticism
    - remorse
    - sarcasm
    - sycophancy

  # Persona pairs to run for CPS and collaboration experiments.
  # Each entry is [persona1, persona2].
  # null = run all combinations from `all` list above.
  pairs: null
  # Example subset:
  # pairs:
  #   - [sycophancy, sarcasm]
  #   - [sycophancy, sycophancy]
  #   - [mathematical, sycophancy]
  #   - [goodness, sycophancy]
  #   - [nonchalance, impulsiveness]

# ── Benchmark ─────────────────────────────────────────────────────────────────
benchmark:
  # "mmlu" or "gpqa"
  name: mmlu

  mmlu:
    subjects:
      - high_school_biology
      - high_school_chemistry
      - high_school_physics
    split: test
    n: 200   # null = all available

  gpqa:
    n: null  # null = all 455

# ── Data paths ────────────────────────────────────────────────────────────────
data:
  mmlu_questions: "../data/mmlu_questions.json"
  mmlu_tf:        "../data/mmlu_TF.json"
  gpqa_questions: "../data/gpqa_455.json"
  gpqa_tf:        "../data/gpqa_TF.json"
  # Claims dataset for persuasion task
  claims:         "../data/persuade_cw.json"

# ── TF chain generation ───────────────────────────────────────────────────────
# Used by prepare_data to build the *_TF.json file.
tf_generation:
  model_type: local   # "local" (GPU) or "api" (requires KEY module)
  api_model: gpt      # only used when model_type = api

# ── Experiments ───────────────────────────────────────────────────────────────
experiments:

  # Download benchmark + generate TF reasoning chains.
  # Set false if data files already exist.
  prepare_data: true

  # ── Experiment 1: Single-agent accuracy baseline ───────────────────────────
  # Each persona answers questions independently. No interaction.
  # Mirrors accuracy.py. Establishes per-persona accuracy floor.
  accuracy:
    run: true

  # ── Experiment 2: Pairwise debate (CPS) ───────────────────────────────────
  # Two agents with different personas debate a factual question.
  # Agent1 starts with correct answer (initial=T) or wrong (initial=F).
  # Mirrors cps.py.
  cps:
    run: true
    # Which initial assignments to run: ["T", "F"] or just ["T"]
    # T = persona1 starts correct, persona2 starts wrong
    # F = persona1 starts wrong,   persona2 starts correct
    initial: [T, F]
    # Turn counts to sweep (mirrors paper ablation N ∈ {1, 4, 8})
    turns: [1, 4, 8]

  # ── Experiment 3: Multi-agent collaboration / persuasion ──────────────────
  # Mirrors collaboration.py. Two sub-modes:
  #   debate    — N agents of persona1 vs M agents of persona2 on a CPS question
  #   persuasion — 1 persuadee (persona1) vs M persuaders (persona2) on a claim
  collaboration:
    run: true

    debate:
      run: true
      # Number of agents per side to sweep
      num_agents: [2, 4]   # num1=num2 (balanced, mirrors paper)
      initial: [T, F]
      turns: [4, 8]

    persuasion:
      run: true
      # Number of persuaders to sweep (persuadee is always 1 agent)
      num_persuaders: [1, 2, 3]
      # Initial stance of persuadee: "support", "oppose", or both
      initial: [support, oppose]
      turns: [4, 8]

# ── Output ────────────────────────────────────────────────────────────────────
output:
  base_dir: "results"
  accuracy: "results/accuracy/opencharacter_{benchmark}.json"
  cps:      "results/cps/{persona1}_{persona2}_{initial}_turn{turns}/"
  collab:   "results/collaboration/{task}/{persona1}_{persona2}_{initial}_turn{turns}/"

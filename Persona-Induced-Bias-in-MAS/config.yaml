# Experiment configuration — pilot run
# Goal: verify that LoRA persona models behave differently from each other
#       and from the base model WITHOUT any system prompt steering.
#
# Run with:  python code/run.py --config config.yaml

# ── Model ─────────────────────────────────────────────────────────────────────
model:
  repo: "maius/llama-3.1-8b-it-personas"
  base_id: "meta-llama/Meta-Llama-3.1-8B-Instruct"
  max_new_tokens: 512
  temperature: 0.0

# ── Personas ──────────────────────────────────────────────────────────────────
# Pilot: 3 maximally different personas + base model (no adapter)
personas:
  run:
    - base          # no LoRA — raw Llama-3.1-8B-Instruct
    - sycophancy    # most agreeable, likely to conform
    - mathematical  # most analytical, likely to resist with reasoning
    - sarcasm       # most contrarian, likely to resist differently

# ── Benchmark ─────────────────────────────────────────────────────────────────
benchmark:
  name: mmlu
  mmlu:
    subjects:
      - high_school_biology
      - high_school_chemistry
      - high_school_physics
    split: test
    n: 50   # small sample for pilot

# ── Data paths ────────────────────────────────────────────────────────────────
data:
  mmlu_questions: "../data/mmlu_questions.json"
  mmlu_tf:        "../data/mmlu_TF.json"

# ── TF chain generation ──────────────────────────────────────────────────────
tf_generation:
  model_type: local
  api_model: gpt

# ── Experiments ───────────────────────────────────────────────────────────────
experiments:

  prepare_data: true

  # Exp 1: Accuracy — does each persona get different scores on the same Qs?
  # 4 models × 50 Qs = 200 inferences
  accuracy:
    run: true

  # Exp 2: Pairwise debate — one round, do agents actually diverge?
  # 3 persona pairs vs base, T only → 3 pairs × 50 Qs × 2 agents = 300 inferences
  # Plus 3 persona-vs-persona pairs to check interaction effects
  cps:
    run: true
    pairs:
      - [sycophancy, base]
      - [mathematical, base]
      - [sarcasm, base]
      - [sycophancy, mathematical]
      - [sycophancy, sarcasm]
      - [mathematical, sarcasm]
    initial: [T]
    turns: 1

# ── Output ────────────────────────────────────────────────────────────────────
output:
  base_dir: "results"
  accuracy: "results/accuracy/pilot_mmlu.json"
  cps:      "results/cps_pilot/{persona1}_{persona2}_{initial}/"

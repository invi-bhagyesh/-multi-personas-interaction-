# Experiment configuration for OpenCharacter persona bias study.
# Pass this file to run.py:  python code/run.py --config config.yaml

# ── Model ─────────────────────────────────────────────────────────────────────
model:
  repo: "maius/qwen-2.5-7b-it-personas"
  base_id: "Qwen/Qwen2.5-7B-Instruct"
  max_new_tokens: 512

# ── Personas ──────────────────────────────────────────────────────────────────
personas:
  run: null

  all:
    - humor
    - impulsiveness
    - loving
    - mathematical
    - nonchalance
    - poeticism
    - remorse
    - sarcasm
    - sycophancy

# ── Benchmark ─────────────────────────────────────────────────────────────────
benchmark:
  # "mmlu", "mmlu_pro", or "gpqa"
  name: mmlu_pro

  mmlu:
    subjects:
      - high_school_biology
      - high_school_chemistry
      - high_school_physics
    split: test
    n: 200

  mmlu_pro:
    # null = all categories. Or list: [physics, chemistry, biology, math]
    categories:
      - physics
      - chemistry
      - biology
    split: test
    n: 200

  gpqa:
    n: null

# ── Data paths ────────────────────────────────────────────────────────────────
data:
  mmlu_questions: "../data/mmlu_questions.json"
  mmlu_tf: "../data/mmlu_TF.json"
  mmlu_pro_questions: "../data/mmlu_pro_questions.json"
  mmlu_pro_tf: "../data/mmlu_pro_TF.json"
  gpqa_questions: "../data/gpqa_455.json"
  gpqa_tf: "../data/gpqa_TF.json"

# ── Experiments to run ────────────────────────────────────────────────────────
experiments:
  prepare_data: true
  accuracy: true
  cps:
    run: true
    mode: both
    turns: 1
    # Subset for preliminary CPS results. null = use personas.run/all
    personas:
      - sycophancy
      - sarcasm
      - mathematical
      - nonchalance

# ── TF chain generation (used by prepare_data) ────────────────────────────────
tf_generation:
  model_type: api
  api_model: gpt-4o-mini

# ── Output ────────────────────────────────────────────────────────────────────
output:
  base_dir: "results"
  accuracy: "results/accuracy/opencharacter_mmlu_pro.json"
  cps_dir: "results/cps_opencharacter"
